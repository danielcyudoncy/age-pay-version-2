name: cls
description: "Age Grade Association Financial Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  cloud_functions: ^5.0.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.0.0

  # State management
  flutter_riverpod: ^2.5.0

  # Payments (using direct Paystack API via http)
  http: ^1.2.0
  webview_flutter: ^4.7.0

  # PDF & reporting
  pdf: ^3.10.0
  printing: ^5.12.0

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.0
  share_plus: ^9.0.0
  image_picker: ^1.1.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/agepay_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/agepay_icon.png"
  web:
    generate: true
    image_path: "assets/icons/agepay_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/agepay_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/agepay_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

  fonts:
    - family: Kanit
      fonts:
        - asset: assets/fonts/Kanit-Regular.ttf
        - asset: assets/fonts/Kanit-Bold.ttf
          weight: 700