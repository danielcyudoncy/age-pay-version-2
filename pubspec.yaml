name: cls
description: "Age Grade Association Financial Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  cloud_functions: ^5.0.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.0.0
  firebase_app_check: ^0.3.1

  # State management
  flutter_riverpod: ^2.5.0

  # Payments (using direct Paystack API via http)
  http: ^1.2.0
  webview_flutter: ^4.7.0

  # PDF & reporting
  pdf: ^3.10.0
  printing: ^5.12.0

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.0
  shared_preferences: ^2.3.0
  share_plus: ^9.0.0
  image_picker: ^1.1.0
  permission_handler: ^11.3.0
  url_launcher: ^6.2.0

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.1

  integration_test:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  printing:
    path: ./patch/printing

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - .env

  fonts:
    - family: Kanit
      fonts:
        - asset: assets/fonts/Kanit-Regular.ttf
        - asset: assets/fonts/Kanit-Bold.ttf
          weight: 700