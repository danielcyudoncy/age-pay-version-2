import java.util.Properties

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.11.1'
    }
}

apply plugin: 'com.android.library'

def flutterProps = new Properties()
file('local.properties').withInputStream { stream ->
    flutterProps.load(stream)
}
def flutterSdk = flutterProps.getProperty('flutter.sdk')
if (flutterSdk == null) {
    throw new GradleException('flutter.sdk not set in local.properties')
}

android {
    namespace 'net.nfet.flutter.printing'
    compileSdk 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        minSdk 16
    }

    lint {
        disable 'InvalidPackage'
    }
}

dependencies {
    implementation 'androidx.annotation:annotation:1.6.0'
    implementation 'androidx.core:core:1.10.1'
    compileOnly files("${flutterSdk}/bin/cache/artifacts/engine/android-arm64-release/flutter.jar")
}

repositories {
    google()
    mavenCentral()
}
